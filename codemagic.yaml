workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    working_directory: smart_car_controller
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $FLUTTER_ROOT/.pub-cache
    scripts:
      - name: Generate iOS platform files
        script: |
          # Create missing Xcode project, Podfile, AppDelegate etc.
          flutter create --platforms=ios --org com.smartcarai .
          # Restore our custom Info.plist (with permissions) from git
          git checkout ios/Runner/Info.plist
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter Analyze
        script: |
          flutter analyze
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS (unsigned)
        script: |
          flutter build ios --debug --no-codesign
      - name: Create IPA
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r "build/ios/iphoneos/Runner.app" build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos
          zip -r SmartCarAI.ipa Payload
    artifacts:
      - build/ios/iphoneos/SmartCarAI.ipa
    publishing:
      email:
        recipients:
          - waleedabdallah238@gmail.com
        notify:
          success: true
          failure: true
